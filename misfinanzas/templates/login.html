<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>

    body {
        font-family: Arial, sans-serif;
        max-width: 400px;
        margin: 50px auto;
        padding: 20px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    input {
        width: 100px;
        padding: 8px;
        box-sizing: border-box;
    }
    button {
        width: 100px;
        padding: 10px;
        background-color: #2196F3;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background-color: #0b7dda;
    }
    .error {
        color: red;
        margin-bottom: 10px;
    }
    .success {
        color: green;
        margin-bottom: 10px;
    }
    .link{
        text-align: center;
        margin-top: 15px;
    }
    </style>
</head>
<body>
    <h1>Iniciar Sesión</h1>
    
    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags %}{{ message.tags }}{% else %}error{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Usuario:</label>
            {{ form.username }}
        </div>
        
        <div class="form-group">
            <label>Contraseña:</label>
            {{ form.password }}
        </div>
        
        <button type="submit">Entrar</button>
    </form>
    
    <div class="link">
        ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate</a>
    </div>
</body>
</html>
