<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Gasto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        form {
            background: #ddd;
            padding: 20px;
            border-radius: 8px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #218838;
        }
        a {
            font-size: large;
            border: solid black 1px;
            background-color: #dddddd;
            padding: 5px 5px 5px 5px;
            display: inline-block;
            margin-top: 10px;
            color: black;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Agregar Nuevo Gasto</h1>
    
    <form method="POST">
        {% csrf_token %}
        
        <label for="precio">Precio ($):</label>
        <input type="number" id="precio" name="precio" required>
        
        <label for="categoria">Categoría:</label>
        <input type="text" id="categoria" name="categoria" required>
        
        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" name="descripcion" rows="3" required></textarea>
        
        <label for="fecha">Fecha (DD/MM):</label>
        <input type="text" id="fecha" name="fecha" placeholder="15/01" required>
        
        <button type="submit">Agregar Gasto</button>
    </form>
    
    <a href="{% url 'gastos' %}">← Volver a la lista</a>
</body>
</html>
